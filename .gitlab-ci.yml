image: docker:24.0.5

variables:
  DOCKER_HOST: tcp://docker:2376
  DOCKER_TLS_CERTDIR: "/certs"
  CI_REGISTRY_IMAGE: registry.lgd.cx/tad/tg-service-v2

stages:
  - test
  - build
  - deploy

services:
  - docker:24.0.5-dind

# =============================================================================
# TEST
# =============================================================================
test:
  stage: test
  image: python:3.12-slim
  services:
    - postgres:16-alpine
    - redis:7-alpine
  variables:
    POSTGRES_DB: test
    POSTGRES_USER: test
    POSTGRES_PASSWORD: test
    DATABASE_URL: postgresql+asyncpg://test:test@postgres:5432/test
    REDIS_URL: redis://redis:6379/0
    ENCRYPTION_KEY: "test_key_32_bytes_for_ci_env_only"
  script:
    - pip install uv -q
    - uv sync --frozen
    - uv run pytest tests/ -v --tb=short
  only:
    - dev
    - merge_requests

# =============================================================================
# BUILD
# =============================================================================
build:
  stage: build
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD registry.lgd.cx
  script:
    - docker build -t $CI_REGISTRY_IMAGE:$CI_COMMIT_SHA -t $CI_REGISTRY_IMAGE:latest .
    - docker push $CI_REGISTRY_IMAGE:$CI_COMMIT_SHA
    - docker push $CI_REGISTRY_IMAGE:latest
  only:
    - dev
    - main
    - tags

# =============================================================================
# DEPLOY
# =============================================================================
deploy:
  stage: deploy
  image: alpine:latest
  before_script:
    - apk add openssh-client
    - eval $(ssh-agent -s)
    - echo "$DEPLOY_SSH_PRIVATE_KEY" | ssh-add -
  script:
    - ssh -o StrictHostKeyChecking=no -p $DEPLOY_SSH_PORT $DEPLOY_SSH_USERNAME@$DEPLOY_SSH_IP "cd /opt/tg-service-v2 && docker compose pull && docker compose up -d"
  only:
    - dev
    - main
  when: manual
